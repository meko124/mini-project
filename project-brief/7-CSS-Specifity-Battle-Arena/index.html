<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>CSS Specifity Battle Arena</title>
	<link href="styles.css" rel="stylesheet" >
</head>
<body>
	
	<h1>⚔️ CSS Specifity Battle Arena</h1>
	<div id="arena">
		<div class="fighter" id="fighterA">
			<h2>Fighter A</h2>
			<input type="text" id="selectorA" placeholder="Selector A, for example: #nav .item">
			<div class="score" id="scoreA">-</div>
			<div class="bar-wrap">
				<div class="bar" id="barA"></div>
			</div>
		</div>

		<div id="vs">VS</div>

		<div class="fighter" id="fighterB">
			<h2>Fighter B</h2>
			<input type="text" id="selectorB" placeholder="Selector B, for example: div.active">
			<div class="score" id="scoreB">-</div>
			<div class="bar-wrap">
				<div class="bar" id="barB"></div>
			</div>
		</div>
	</div>

	<button id="btnBattle">⚔️ BATTLE</button>
	<div id="result"></div>
	
	<script src="script.js"></script>
</body>
</html>
